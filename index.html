<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Number Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div class="container">
    <h1>
      Number Generator
    </h1>
    <p>
      Generate a random number using the button below
    </p>
    
    <form id="myForm2">
      <input type="text" required="startNum" placeholder="Enter start number value" id="startNum">
      
      <button type="submit">set</button>
    </form>
    
    <form id="myForm">
      <input type="text" required="endNum" placeholder="Enter end number value" id="endNum">
      
        <button type="submit">set</button>
    </form>
    
    <p id="values">default values:<br>start = 1 <br> end = 1 </p>
    <div class="btn-div">
      <button class="generator" id="generator">Generate</button>
    </div>
    <p class="display" id="display">Number: </p>
  </div>
  
  <script src="script.js"></script>
</body>

</html>
